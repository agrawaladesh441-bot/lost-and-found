{% extends 'base.html' %}
{% block title %}Sign up{% endblock %}

{% block content %}
<div class="auth-wrapper">
  <div class="auth-card shadow-sm">
    <div class="text-center mb-4">
      <div class="brand-mark mx-auto mb-3">L&amp;F</div>
      <h3 class="fw-bold mb-1">Create your account</h3>
      <p class="text-muted small mb-0">Join your campus's lost &amp; found community.</p>
    </div>

    <form method="post" novalidate>
      <div class="row g-3">
        <div class="col-md-6">
          <label class="form-label">Full name</label>
          <input type="text" name="name" class="form-control" required>
        </div>
        <div class="col-md-6">
          <label class="form-label">Roll number</label>
          <input type="text" name="roll_number" class="form-control" required>
        </div>
        <div class="col-md-7">
          <label class="form-label">College email</label>
          <input type="email" name="email" class="form-control" required>
        </div>
        <div class="col-md-5">
          <label class="form-label">Phone (optional)</label>
          <input type="tel" name="phone" class="form-control">
        </div>
        <div class="col-md-6">
          <label class="form-label">Password</label>
          <input type="password" name="password" class="form-control" required minlength="6">
        </div>
        <div class="col-md-6">
          <label class="form-label">Confirm password</label>
          <input type="password" name="confirm_password" class="form-control" required minlength="6">
        </div>
      </div>

      <button type="submit" class="btn btn-primary btn-lg w-100 mt-4">Create account</button>
    </form>

    <div class="text-center mt-4 small">
      Already registered?
      <a href="{{ url_for('login') }}" class="text-decoration-none fw-semibold">Log in</a>
    </div>
  </div>
</div>
{% endblock %}
