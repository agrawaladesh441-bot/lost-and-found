{% extends 'base.html' %}
{% block title %}Edit Item{% endblock %}

{% block content %}
<div class="container py-4">
  <div class="row justify-content-center">
    <div class="col-lg-8">
      <h2 class="fw-bold mb-3">Edit Item</h2>
      <div class="card border-0 shadow-sm">
        <div class="card-body p-4">
          <form method="post" enctype="multipart/form-data" novalidate>
            <div class="mb-3">
              <label class="form-label fw-semibold">Title</label>
              <input type="text" name="title" class="form-control"
                     value="{{ item.title }}" required maxlength="140">
            </div>

            <div class="row g-3">
              <div class="col-md-6">
                <label class="form-label fw-semibold">Category</label>
                <select name="category" class="form-select" required>
                  {% for cat in categories %}
                    <option value="{{ cat }}" {{ 'selected' if item.category == cat }}>{{ cat }}</option>
                  {% endfor %}
                </select>
              </div>
              <div class="col-md-6">
                <label class="form-label fw-semibold">Date</label>
                <input type="date" name="date_occurred" class="form-control"
                       value="{{ item.date_occurred.strftime('%Y-%m-%d') }}" required>
              </div>
            </div>

            <div class="mt-3">
              <label class="form-label fw-semibold">Location</label>
              <input type="text" name="location" class="form-control"
                     value="{{ item.location }}" required>
            </div>

            <div class="mt-3">
              <label class="form-label fw-semibold">Description</label>
              <textarea name="description" rows="4" class="form-control" required>{{ item.description }}</textarea>
            </div>

            <div class="mt-3">
              <label class="form-label fw-semibold">Replace photo (optional)</label>
              {% if item.image_filename %}
                <div class="mb-2">
                  <img src="{{ url_for('uploaded_file', filename=item.image_filename) }}"
                       alt="" style="height:120px;object-fit:cover;border-radius:8px;">
                </div>
              {% endif %}
              <input type="file" name="image" class="form-control" accept="image/*">
            </div>

            <div class="mt-3">
              <label class="form-label fw-semibold">Contact info</label>
              <input type="text" name="contact_info" class="form-control"
                     value="{{ item.contact_info or '' }}">
            </div>

            <div class="d-flex justify-content-end gap-2 mt-4">
              <a href="{{ url_for('item_detail', item_id=item.id) }}" class="btn btn-outline-secondary">Cancel</a>
              <button type="submit" class="btn btn-primary px-4">Save Changes</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
